<!DOCTYPE html>
<html lang="en" id="htmlTag" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GrowwCar Vintage - Login</title>
    <link rel="icon" type="imags/jpg" href="img/growwpark_logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#b91c1c'
                    }
                } 
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif !important;
            transition: all 0.3s ease;
        }
        
        body { 
            background: #F8F9FD;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dark body {
            background: #0F172A;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #dc2626;
            transition: all 0.3s ease;
            padding: 8px 16px;
            justify-content: center;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-200-to-br from-amber-50 to-amber-100 dark:from-[#0F172A] dark:to-[#1E293B] p-3 sm:p-4 md:p-5">
    
    <!-- Top Right Controls -->
    <div class="fixed top-3 right-3 sm:top-4 sm:right-4 md:top-5 md:right-5 flex items-center gap-2 z-50">
        <button onclick="toggleDirection()" class="p-2 bg-white dark:bg-gray-800 rounded-lg shadow-md hover:scale-105 transition-all border border-gray-200 dark:border-gray-700">
            <i data-lucide="languages" class="w-4 h-4 sm:w-5 sm:h-5 text-primary"></i>  
        </button>
        <button onclick="toggleDarkMode()" class="p-2 bg-white dark:bg-gray-800 rounded-lg shadow-md hover:scale-105 transition-all border border-gray-200 dark:border-gray-700">
            <i id="themeIcon" data-lucide="moon" class="w-4 h-4 sm:w-5 sm:h-5 text-primary"></i>
        </button>
    </div>

    <!-- Login Card - Responsive -->
    <div class="w-full max-w-[90%] sm:max-w-[380px] md:max-w-[400px] lg:max-w-[420px] mx-auto">
        <div class="bg-white dark:bg-[#1E293B] rounded-xl sm:rounded-2xl shadow-xl border border-amber-200 dark:border-gray-700 p-4 sm:p-5 md:p-6">
            
            <!-- Logo - Red with Wrench Icon -->
                <a href="index.html" class="logo">
                    
                    <span class="font-black text-lg text-primary">Groww</span>
                    <span class="font-black text-lg text-gray-500 dark:text-white">Vintage</span>
                </a>
            
            
            <!-- Title -->
            <h1 class="text-xl sm:text-xl md:text-xl font-black text-center text-gray-900 dark:text-white mb-4 sm:mb-5">
                Welcome <span class="text-primary">Back</span>
            </h1>
            
            <!-- Form -->
            <form class="space-y-3 sm:space-y-4">
                <!-- Email Field -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">Email Address</label>
                    <input type="email" placeholder="Enter your email" 
                           class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:border-primary focus:outline-none transition-all placeholder:text-gray-400">
                </div>
                
                <!-- Password Field -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Enter your password" 
                               class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:border-primary focus:outline-none transition-all pr-9 sm:pr-10 placeholder:text-gray-400">
                        <button type="button" onclick="togglePassword()" class="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary">
                            <i id="passwordIcon" data-lucide="eye" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-1.5 sm:gap-2 cursor-pointer">
                        <input type="checkbox" class="accent-primary w-3.5 h-3.5 sm:w-4 sm:h-4 rounded">
                        <span class="text-[10px] sm:text-xs text-gray-600 dark:text-gray-400">Remember me</span>
                    </label>
                    <a href="#" class="text-[10px] sm:text-xs font-bold text-primary hover:underline">
                        Forgot password?
                    </a>
                </div>
                
                <!-- Login Button -->
                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-2.5 sm:py-3 px-4 rounded-lg transition-all shadow-md text-xs sm:text-sm mt-2">
                    Log In
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-4 sm:my-5">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-[9px] sm:text-[10px]">
                    <span class="bg-white dark:bg-[#1E293B] px-3 text-gray-500">or continue with</span>
                </div>
            </div>
            
            <!-- Social Icons -->
            <div class="grid grid-cols-3 gap-2 sm:gap-3 mb-4 sm:mb-5">
                <button class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all">
                    
                    <span class="text-[9px] sm:text-[10px] font-medium text-gray-600 dark:text-gray-400">Google</span>
                </button>
                <button class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all">
                    
                    <span class="text-[9px] sm:text-[10px] font-medium text-gray-600 dark:text-gray-400">Apple</span>
                </button>
                <button class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all">
                    
                    <span class="text-[9px] sm:text-[10px] font-medium text-gray-600 dark:text-gray-400">Facebook</span>
                </button>
            </div>
            
            <!-- Sign Up Link -->
            <p class="text-center text-[10px] sm:text-xs text-gray-500">
                Don't have an account? 
                <a href="signup.html" class="text-primary font-bold hover:underline">
                    Create new account
                </a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            icon.setAttribute('data-lucide', html.classList.contains('dark') ? 'sun' : 'moon');
            lucide.createIcons();
            localStorage.setItem('darkMode', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('darkMode') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon')?.setAttribute('data-lucide', 'sun');
            lucide.createIcons();
        }

        function toggleDirection() {
            const html = document.getElementById('htmlTag');
            html.dir = html.dir === 'ltr' ? 'rtl' : 'ltr';
        }

        function togglePassword() {
            const password = document.getElementById('password');
            const icon = document.getElementById('passwordIcon');
            if (password.type === 'password') {
                password.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                password.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
